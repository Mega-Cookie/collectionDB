{{define "entries/edit.html"}}
{{template "header.html"}}
<div style="margin-left:150px;padding:1px 16px;height:1000px;">
    <div class="max-w-4xl mx-auto p-4">
      <form action="/entries/{{.Entry.ID}}/edit" method="POST">
        <div class="flex justify-between items-center mb-4 pb-4 border-b">
          <div>
            <input class="w-full text-4xl font-bold focus:outline-none" type="text" id="title" name="title" value="{{.Entry.Title}}" required>
          </div>
          <div>
            <button type="submit">
              <a class="mr-1 text-lg bg-blue-200 text-blue-800 py-2 px-2 rounded-md border-2 border-blue-800 hover:bg-blue-400">Confirm</a>
            </button>
            <button>
              <a href="/" class="ml-1 text-lg bg-red-200 text-red-800 py-2 px-2 rounded-md border-2 border-red-800 hover:bg-red-400">Cancel</a>
            </button>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-6">
          <div>
            <label for="year" class="text-lg mr-2">Year:</label>
            <input type="number" id="year" name="year" value="{{.Entry.Year}}" required class="border-2 border-blue-800 rounded-md">
            <div>
              <label for="mediatypes" class="text-lg mr-2">Type of physical media:</label>
              <select id="mediatypeid" name="mediatypeid" class="mr-2">
                {{range .MediaTypes}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
                <option value="{{.Entry.MediaType.ID}}" selected hidden>{{.Entry.MediaType.Name}}</option>
              </select>
            </div>
            <label for="IMDB" class="text-lg mr-2">IMDB:</label>
            <input type="text" id="imdbid" name="imdbid" value="{{.Entry.ImdbID}}" class="border-2 border-blue-800 rounded-md">
            <div>
              <label for="collection" class="text-lg mr-2">Collection:</label>
              <select id="collid" name="collid" class="mr-2">
                {{range .Collections}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
                <option value="{{.Entry.Collection.ID}}" selected hidden>{{.Entry.Collection.Name}}</option>
              </select>
            </div>
            <div>
              <label for="genres" class="text-lg mr-2">Genre:</label>
              <select id="genreid" name="genreid" class="mr-2">
                {{range .Genres}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
                <option value="{{.Entry.Genre.ID}}" selected hidden>{{.Entry.Genre.Name}}</option>
              </select>
            </div>
            <div>
              <label for="bar_code" class="text-lg mr-2">Barcode:</label>
              <input type="text" id="bar_code" name="bar_code" value="{{.Entry.BarCode}}" class="border-2 border-blue-800 rounded-md">
            </div>
            <div>
              <label for="region_code" class="text-lg mr-2">Regioncode:</label>
              <input type="text" id="region_code" name="region_code" value="{{.Entry.RegionCode}}" class="border-2 border-blue-800 rounded-md">
            </div>
            <div>
              <label for="release_date" class="text-lg mr-2">Media release date:</label>
              <input type="date" id="release_date" name="release_date" value="{{.Entry.Released}}" min="1900-01-01" max="3000-12-31" class="border-2 border-blue-800 rounded-md">
            </div>
            <div>
              <label for="is_digital" class="text-lg mr-2">Media is digitized:</label>
              {{if .Entry.IsDigital}}
              <input type="checkbox" id="is_digital" name="is_digital" class="mr-2" checked>
              {{else}}
              <input type="checkbox" id="is_digital" name="is_digital" class="mr-2">
              {{end}}
            </div>
            <div>
              <label for="is_booklet" class="text-lg mr-2">Media has booklet:</label>
              {{if .Entry.IsBooklet}}
              <input type="checkbox" id="is_booklet" name="is_booklet" class="mr-2" checked>
              {{else}}
              <input type="checkbox" id="is_booklet" name="is_booklet" class="mr-2">
              {{end}}
            </div>
            <div>
              <label for="casetypes" class="text-lg mr-2">Type of Case:</label>
              <select id="casetypeid" name="casetypeid" class="mr-2">
                {{range .CaseTypes}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
                <option value="{{.Entry.CaseType.ID}}" selected hidden>{{.Entry.CaseType.Name}}</option>
              </select>
            </div>
            <div>
              <label for="mediacount" class="text-lg mr-2">Media Count:</label>
              <input type="number" id="mediacount" name="mediacount" value="{{.Entry.MediaCount}}" class="border-2 border-blue-800 rounded-md">
            </div>
            <div>
              <label for="audiolangs" class="text-lg mr-2">Audio Languanges:</label>
              <input type="text" id="audiolangs" name="audiolangs" value="{{.Entry.AudioLangs}}" class="border-2 border-blue-800 rounded-md">
            </div>
            <div>
              <label for="sublangs" class="text-lg mr-2">Subtitles Languanges:</label>
              <input type="text" id="sublangs" name="sublangs" value="{{.Entry.SubLangs}}" class="border-2 border-blue-800 rounded-md">
            </div>
            <div>
              <label for="publishers" class="text-lg mr-2">Publisher:</label>
              <select id="publisherid" name="publisherid" class="mr-2">
                {{range .Publishers}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
                <option value="{{.Entry.Publisher.ID}}" selected hidden>{{.Entry.Publisher.Name}}</option>
              </select>
            </div>
          </div>
          <div>
            <textarea id="plot" name="plot" rows="5" required class="w-full p-4 text-md border-2 border-blue-800 rounded-md">{{.Entry.Plot}}</textarea>
            <textarea id="comment" name="comment" rows="3" required class="w-full p-4 text-md border-2 border-blue-800 rounded-md">{{.Entry.Comment}}</textarea>
          </div>
        </div>
      </form>
      <p class="text-sm text-gray-500"><em>Created on: {{.Entry.CreatedAt}} - Edited on: {{.Entry.EditedAt}}</em></p>
      </div>
{{template "footer.html"}}
{{end}}
